<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    .dosbox-container { width: 100% !important; height: 100% !important; }
    .dosbox-container > .dosbox-overlay { background-size: cover; background-position: center; }
    .dosbox-container canvas { width: 100% !important; height: 100% !important; }
  </style>
</head>
<body>
  <div id="dosbox"></div>
  <script src="https://js-dos.com/cdn/js-dos-api.js"></script>
  <script>
    // Parse game from URL params: ?game=0 (default), ?game=1, etc.
    var params = new URLSearchParams(window.location.search);
    var gameIndex = parseInt(params.get('game') || '0', 10);

    var games = [
      { zip: 'assets/games/dave1_original.zip', exe: './DAVE.EXE', title: 'Dangerous Dave' },
      { zip: 'assets/games/dave2_haunted_mansion.zip', exe: './DAVE.EXE', title: 'Dangerous Dave in the Haunted Mansion' },
      { zip: 'assets/games/dave3_risky_rescue.zip', exe: './dave.exe', title: "Dangerous Dave's Risky Rescue" },
      { zip: 'assets/games/dave4_goes_nutz.zip', exe: './START.BAT', title: 'Dangerous Dave Goes Nutz!' }
    ];

    var game = games[gameIndex] || games[0];

    var dosbox = new Dosbox({
      id: "dosbox",
      onload: function(dosbox) {
        dosbox.run(game.zip, game.exe);
      },
      onrun: function(dosbox, app) {
        // Notify parent frame that game is loaded
        if (window.parent !== window) {
          window.parent.postMessage({ type: 'dave-game-loaded', title: game.title }, '*');
        }
      }
    });

    // Audio mute control
    var audioMuted = true; // Start muted by default

    function applyMuteState(muted) {
      audioMuted = muted;
      // Mute/unmute all audio elements
      var audios = document.querySelectorAll('audio');
      audios.forEach(function(a) { a.muted = muted; });
      // Suspend/resume AudioContext if available
      if (window.SDL && window.SDL.audioContext) {
        if (muted) window.SDL.audioContext.suspend();
        else window.SDL.audioContext.resume();
      }
      // Also check for any Web Audio contexts created by DOSBox
      var allContexts = window.AudioContext || window.webkitAudioContext;
      if (window._audioCtx) {
        if (muted) window._audioCtx.suspend();
        else window._audioCtx.resume();
      }
    }

    // Intercept AudioContext creation to track and control it
    (function() {
      var OrigAudioContext = window.AudioContext || window.webkitAudioContext;
      if (OrigAudioContext) {
        window.AudioContext = window.webkitAudioContext = function() {
          var ctx = new OrigAudioContext();
          window._audioCtx = ctx;
          if (audioMuted) ctx.suspend();
          return ctx;
        };
        // Preserve prototype
        window.AudioContext.prototype = OrigAudioContext.prototype;
      }
    })();

    // Listen for mute/unmute commands from parent
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'dave-mute') {
        applyMuteState(e.data.muted);
      }
    });
  </script>
</body>
</html>
